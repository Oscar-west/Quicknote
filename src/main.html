<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./main.css" />
    <title>Quicknote</title>
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-menu-bar">
          <div class="menu-item">
            <button class="menu-trigger">File</button>
            <div class="menu-dropdown" hidden>
              <button id="export-json-btn" class="menu-option">Export as JSON</button>
              <button id="import-json-btn" class="menu-option">Import from JSON</button>
              <hr class="menu-divider" />
              <button id="about-btn" class="menu-option">About Quicknote</button>
            </div>
          </div>
        </div>
        <!-- System items -->
        <div class="sidebar-item active" data-folder="all">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          </svg>
          <span>All Ideas</span>
          <span class="folder-count" id="all-count"></span>
        </div>
        <div class="sidebar-item" data-folder="1">
          <span>Inbox</span>
          <span class="sidebar-badge badge-red" id="inbox-badge" hidden></span>
        </div>
        <div class="sidebar-item" id="review-btn" data-view="review">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span>Review</span>
          <span class="sidebar-badge badge-orange" id="review-badge" hidden></span>
        </div>

        <!-- Collapsible folders section -->
        <div class="folders-header" id="folders-header">
          <svg class="folders-chevron" id="folders-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
          <span>FOLDERS</span>
        </div>
        <div id="folder-list"></div>
        <button id="new-folder-btn" class="sidebar-new-folder">+ New Folder</button>
        <div id="new-folder-form" class="new-folder-form" hidden>
          <input id="folder-name-input" class="folder-name-input" placeholder="Folder name" maxlength="30" spellcheck="false" />
          <div id="color-palette" class="color-palette"></div>
          <div class="new-folder-actions">
            <button id="folder-save-btn" class="folder-action-btn save">Create</button>
            <button id="folder-cancel-btn" class="folder-action-btn cancel">Cancel</button>
          </div>
        </div>

        <!-- Neglected (trash) -->
        <hr class="sidebar-divider" />
        <div class="sidebar-item neglected-item" data-view="neglected">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
          <span>Neglected</span>
          <span class="folder-count" id="neglected-count"></span>
        </div>
      </aside>

      <div class="container">
        <header>
          <div class="search-wrapper">
            <svg
              class="search-icon"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input
              type="text"
              id="search"
              placeholder="Search ideas..."
              spellcheck="false"
            />
          </div>
        </header>
        <main id="ideas-list"></main>
        <div id="empty-state" class="empty-state" hidden>
          <svg
            width="48"
            height="48"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            opacity="0.4"
          >
            <path
              d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2z"
            />
          </svg>
          <p id="empty-message"></p>
        </div>
        <button id="fab-add" class="fab" title="New idea">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- New idea modal -->
    <div id="new-idea-dialog" class="dialog-overlay" hidden>
      <div class="dialog new-idea-dialog">
        <p class="dialog-title">New Idea</p>
        <textarea id="new-idea-text" class="new-idea-textarea" placeholder="Type your idea..." rows="4" spellcheck="false"></textarea>
        <div class="dialog-actions">
          <button id="new-idea-cancel" class="dialog-btn">Cancel</button>
          <button id="new-idea-save" class="dialog-btn primary">Save</button>
        </div>
      </div>
    </div>

    <!-- Context menu -->
    <div id="context-menu" class="context-menu" hidden>
      <div class="context-menu-label">Move to...</div>
      <div id="context-menu-folders"></div>
      <hr class="menu-divider" />
      <button id="context-menu-delete" class="context-menu-option danger">Delete</button>
    </div>

    <!-- Folder delete confirmation dialog -->
    <div id="delete-folder-dialog" class="dialog-overlay" hidden>
      <div class="dialog">
        <p class="dialog-title">Delete folder "<span id="delete-folder-name"></span>"?</p>
        <div class="dialog-options">
          <label><input type="radio" name="delete-action" value="move" checked /> Move ideas to Inbox</label>
          <label><input type="radio" name="delete-action" value="delete" /> Delete ideas too</label>
        </div>
        <div class="dialog-actions">
          <button id="delete-folder-confirm" class="dialog-btn danger">Delete</button>
          <button id="delete-folder-cancel" class="dialog-btn">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Clear neglected confirmation dialog -->
    <div id="clear-neglected-dialog" class="dialog-overlay" hidden>
      <div class="dialog">
        <p class="dialog-title">Clear all neglected ideas?</p>
        <p style="font-size:14px;color:var(--text-muted);margin-bottom:16px;">This will permanently delete all neglected ideas. This cannot be undone.</p>
        <div class="dialog-actions">
          <button id="clear-neglected-cancel" class="dialog-btn">Cancel</button>
          <button id="clear-neglected-confirm" class="dialog-btn danger">Clear All</button>
        </div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
