<svg width="167" height="216" viewBox="0 0 167 216" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Main metallic gradient for the letter -->
  <linearGradient id="metalGrad" x1="0.5" y1="0" x2="0.5" y2="1">
    <stop offset="0%" stop-color="#8a8a8a"/>
    <stop offset="15%" stop-color="#7a7a7a"/>
    <stop offset="40%" stop-color="#5a5a5a"/>
    <stop offset="60%" stop-color="#4a4a4a"/>
    <stop offset="85%" stop-color="#5e5e5e"/>
    <stop offset="100%" stop-color="#6a6a6a"/>
  </linearGradient>
  <!-- Left-to-right highlight for 3D curvature -->
  <linearGradient id="sideLight" x1="0" y1="0.5" x2="1" y2="0.5">
    <stop offset="0%" stop-color="white" stop-opacity="0.0"/>
    <stop offset="30%" stop-color="white" stop-opacity="0.08"/>
    <stop offset="50%" stop-color="white" stop-opacity="0.12"/>
    <stop offset="70%" stop-color="white" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="white" stop-opacity="0.0"/>
  </linearGradient>
  <!-- Top specular highlight -->
  <radialGradient id="specular" cx="0.45" cy="0.15" r="0.6" fx="0.45" fy="0.1">
    <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
    <stop offset="40%" stop-color="white" stop-opacity="0.05"/>
    <stop offset="100%" stop-color="white" stop-opacity="0"/>
  </radialGradient>
  <!-- Bevel/emboss filter -->
  <filter id="bevel" x="-5%" y="-5%" width="110%" height="110%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
    <feSpecularLighting in="blur" surfaceScale="3" specularConstant="0.5" specularExponent="20" result="spec" lighting-color="#ffffff">
      <fePointLight x="83" y="60" z="80"/>
    </feSpecularLighting>
    <feComposite in="spec" in2="SourceAlpha" operator="in" result="specOut"/>
    <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="0.3" k4="0"/>
  </filter>
</defs>
